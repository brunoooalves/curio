services:
  mongo:
    image: mongo:7
    container_name: curio-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: curio
      MONGO_INITDB_ROOT_PASSWORD: curio
      MONGO_INITDB_DATABASE: curio
    volumes:
      - curio_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  curio_mongo_data:
