name: Auto-increment tag on push to main

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: version
        run: |
          git fetch --tags --force
          LATEST=$(git tag -l '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            NEXT="$((MAJOR + 1)).0.0"
          fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Latest: ${LATEST:-none} → Next: $NEXT"
      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"
